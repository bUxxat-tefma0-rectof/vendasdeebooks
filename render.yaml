services:
  - type: web
    name: bot-vendas
    env: python
    region: oregon
    runtime: python311
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python main.py
    envVars:
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bot-vendas-db
          property: connectionString
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: VALOR_MINIMO_PIX
        value: "10.00"
      - key: VALOR_MAXIMO_PIX
        value: "500.00"
      - key: TEMPO_EXPIRACAO_PIX
        value: "300"
      - key: BONUS_DEPOSITO_PORCENTAGEM
        value: "5.0"
      - key: COMISSAO_AFILIADO_PADRAO
        value: "10.0"
      - key: GRUPO_SUPORTE_LINK
        sync: false
      - key: TERMOS_USO_LINK
        sync: false
      - key: LOG_LEVEL
        value: "INFO"

databases:
  - name: bot-vendas-db
    plan: free
    databaseName: bot_vendas
    user: bot_admin
